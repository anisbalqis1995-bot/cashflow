<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow E-Surau - Kutipan Jumaat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar-placeholder" class="sidebar-container"></div>

    <div class="main-content">
        <div class="content-header">
            <h1>📅 Rekod Kutipan Hari Jumaat</h1>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Tarikh Jumaat</th>
                    <th>Minggu Fokus</th>
                    <th>Saringan Petugas Pengira</th>
                    <th>Jumlah Kutipan Am (RM)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>05/06/2026</td>
                    <td>Minggu 1</td>
                    <td>Ustaz Azlan & En. Ramli</td>
                    <td style="font-weight: bold; color: #059669;">RM 2,840.00</td>
                </tr>
                <tr>
                    <td>12/06/2026</td>
                    <td>Minggu 2</td>
                    <td>En. Ramli & Haji Idris</td>
                    <td style="font-weight: bold; color: #059669;">RM 3,000.00</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        fetch('sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-placeholder').innerHTML = data;
                var scripts = document.getElementById('sidebar-placeholder').getElementsByTagName('script');
                for (var i = 0; i < scripts.length; i++) { eval(scripts[i].innerText); }
            });
    </script>
</body>
</html>
