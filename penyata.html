<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow E-Surau - Penyata Bulanan</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Butang muat turun khas untuk halaman penyata */
        .btn-action { display: inline-block; padding: 6px 12px; background-color: #059669; color: white; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: bold; transition: 0.2s; border: none; cursor: pointer; }
        .btn-action:hover { background-color: #047857; }
        .btn-secondary { background-color: #1e293b; }
        .btn-secondary:hover { background-color: #0f172a; }
    </style>
</head>
<body>

    <div id="sidebar-placeholder" class="sidebar-container"></div>

    <div class="main-content">
        <div class="content-header">
            <h1>💵 Penyata Bulanan Rasmi</h1>
        </div>

        <div class="search-card" style="text-align: left;">
            <div class="search-title" style="margin-bottom: 10px;">🗄️ REKOD DOKUMEN SOKONGAN</div>
            <p style="font-size: 13px; color: #64748b;">Klik butang di bawah untuk memuat turun atau menyemak fail imbasan (*scan*) penyata bank serta resit rasmi e-Surau.</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Bulan / Tahun</th>
                    <th>Tarikh Audit Dalaman</th>
                    <th>Penyata Bank (PDF)</th>
                    <th>Buku Log Fail (Excel)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong>Jun 2026</strong></td>
                    <td>02/07/2026</td>
                    <td><button class="btn-action">📄 Muat Turun</button></td>
                    <td><button class="btn-action btn-secondary">📊 Muat Turun</button></td>
                </tr>
                <tr>
                    <td><strong>Mei 2026</strong></td>
                    <td>05/06/2026</td>
                    <td><button class="btn-action">📄 Muat Turun</button></td>
                    <td><button class="btn-action btn-secondary">📊 Muat Turun</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        fetch('sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-placeholder').innerHTML = data;
                var scripts = document.getElementById('sidebar-placeholder').getElementsByTagName('script');
                for (var i = 0; i < scripts.length; i++) { eval(scripts[i].innerText); }
            });
    </script>
</body>
</html>
